# نشر واجهة الموقع إلى GitHub Pages (ملفات ثابتة من dist/client)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (static + prerender)
        env:
          # نطاق مخصص (مثل althuraya.store): اترك / أو عيّن متغير الريبو: VITE_BASE
          VITE_BASE: ${{ vars.VITE_BASE }}
          VITE_CONTACT_API_URL: ${{ vars.VITE_CONTACT_API_URL }}
        run: npm run build:github-pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
