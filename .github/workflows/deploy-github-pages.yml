# نشر واجهة الموقع إلى GitHub Pages (ملفات ثابتة من dist/client)
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        shell: bash
        run: |
          set -euo pipefail
          echo "Workspace: $PWD"
          ls -la
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is not in the repo root. It must be committed (do not .gitignore it). On your machine: npm install && git add package-lock.json && git commit -m 'chore: add package lock' && git push"
            exit 1
          fi
          npm ci --no-audit

      - name: Build (static + prerender)
        shell: bash
        env:
          GH_PAGES: "1"
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run build

      # v4 يرمّن الأرشيف دون الملفات النقطية — ننسخ .assetsignore باسم غير نقطي إن وُجد
      - name: Pages artifact inclusions
        run: |
          if [ -f dist/client/.assetsignore ] && [ ! -f dist/client/_assetsignore ]; then
            cp dist/client/.assetsignore dist/client/_assetsignore
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
